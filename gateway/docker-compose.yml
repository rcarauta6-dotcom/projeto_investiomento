version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CORE_SERVICE_URL=http://core-service:8081
      - INGESTION_SERVICE_URL=http://ingestion-service:8082
      - AI_SERVICE_URL=http://ai-service:8084
    networks:
      - investment-network

networks:
  investment-network:
    driver: bridge
