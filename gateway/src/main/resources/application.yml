server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

      routes:
        - id: core-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/core/**, /api/v1/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG