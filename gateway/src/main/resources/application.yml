server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

      routes:
        - id: core-service-external
          uri: ${CORE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/gateway/v1/**
          filters:
            - RewritePath=/gateway/v1/(?<segment>.*), /api/v1/${segment}
        
        - id: core-service-internal
          uri: ${CORE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/core/**, /api/v1/**

        - id: ingestion-service
          uri: ${INGESTION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/ingestion/**, /api/quote/**, /api/quotes/**, /api/v1/market/**

        - id: ai-service
          uri: ${AI_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - RewritePath=/api/v1/ai/(?<segment>.*), /api/ai/${segment}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG