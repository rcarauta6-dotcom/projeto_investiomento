apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: gateway-ns
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: CORE_SERVICE_URL
          value: "http://core-service.core-ns:8081"
        - name: INGESTION_SERVICE_URL
          value: "http://ingestion-service.ingestion-ns:8082"
        - name: AI_SERVICE_URL
          value: "http://ai-service.ai-service-ns:8084"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: gateway-ns
  labels:
    app: gateway
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: gateway
