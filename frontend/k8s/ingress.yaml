apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: frontend-ns
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-ingress-nodeport
  namespace: frontend-ns
  labels:
    app: frontend
spec:
  type: NodePort
  ports:
  - port: 8081
    targetPort: 80
    protocol: TCP
    name: http
    nodePort: 30081
  selector:
    app: frontend