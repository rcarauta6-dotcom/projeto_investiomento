version: '3.8'

services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - GROQ_API_KEY=change-me
      - KAFKA_BROKERS=kafka-dev-kafka:9092
    volumes:
      - ./data:/app/data
    networks:
      - investment-network

networks:
  investment-network:
    driver: bridge
