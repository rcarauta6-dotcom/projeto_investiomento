apiVersion: v1
kind: Namespace
metadata:
  name: ai-service-ns
  labels:
    name: ai-service-ns
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-service-data-pvc
  namespace: ai-service-ns
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: ai-service-ns
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: ai-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8084
        env:
        - name: GROQ_API_KEY
          value: "PLACEHOLDER_GROQ_KEY"
        - name: KAFKA_BROKERS
          value: "kafka-dev-kafka.meu-kafka-ns:9092"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: ai-data
          mountPath: /app/data
        livenessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 15
      volumes:
      - name: ai-data
        persistentVolumeClaim:
          claimName: ai-service-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: ai-service-ns
  labels:
    app: ai-service
spec:
  type: ClusterIP
  ports:
  - port: 8084
    targetPort: 8084
    protocol: TCP
    name: http
  selector:
    app: ai-service
